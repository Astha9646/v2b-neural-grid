# =============================================================================
# V2B Neural Grid — Docker Compose (production)
# Usage:
#   cp .env.example .env
#   docker compose up --build -d
#   open http://localhost
# =============================================================================

name: v2b-neural-grid

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: v2b-backend
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8001}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEBUG: ${DEBUG:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/data/v2b_api.db}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-insecure-change-me-before-production}
      REQUIRE_AUTH: ${REQUIRE_AUTH:-true}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      CHECKPOINT_DIR: ${CHECKPOINT_DIR:-/app/checkpoints/quick_test/best}
      INFERENCE_DEVICE: ${INFERENCE_DEVICE:-auto}
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./data:/app/data
      - v2b-logs:/app/logs
    expose:
      - "8001"
    networks:
      - neural-grid
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_APP_ENV: ${VITE_APP_ENV:-production}
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-}
    container_name: v2b-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - neural-grid
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  neural-grid:
    driver: bridge

volumes:
  v2b-logs:
    driver: local
